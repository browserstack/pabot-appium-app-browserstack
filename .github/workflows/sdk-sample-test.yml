# Runs the BrowserStack SDK sample against a given commit and reports a status check.
# Trigger: Actions tab -> "Pabot (Robot) Appium App Automate SDK sample test" -> Run workflow -> paste the PR's full commit SHA.
# Requires repo secrets: BROWSERSTACK_USERNAME, BROWSERSTACK_ACCESS_KEY.
# NOTE (App Automate): the app under test is referenced via `app: bs://...` in browserstack.yml;
# ensure that uploaded app exists on the account whose secrets are used (re-upload + update if expired).
name: Pabot (Robot) Appium App Automate SDK sample test

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'The full commit id to build'
        required: true

jobs:
  sdk-sample:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [ubuntu-latest]
        python: ['3.10', '3.11']
    name: pabot-appium Python ${{ matrix.python }} sample
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
      - name: Mark status check in_progress
        uses: actions/github-script@v7
        env:
          job_name: pabot-appium Python ${{ matrix.python }} sample
          commit_sha: ${{ github.event.inputs.commit_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner, repo: context.repo.repo,
              name: process.env.job_name, head_sha: process.env.commit_sha,
              status: 'in_progress'
            }).catch(e => console.log('check create failed:', e.status));
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          pip install -r requirements.txt
      - name: Run sample test
        run: |
          browserstack-sdk pabot --processes 1 tests/wikipedia_sample.robot
      - name: Mark status check completed
        if: always()
        uses: actions/github-script@v7
        env:
          conclusion: ${{ job.status }}
          job_name: pabot-appium Python ${{ matrix.python }} sample
          commit_sha: ${{ github.event.inputs.commit_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner, repo: context.repo.repo,
              name: process.env.job_name, head_sha: process.env.commit_sha,
              status: 'completed', conclusion: process.env.conclusion
            }).catch(e => console.log('check create failed:', e.status));
